<!DOCTYPE html>
<html>
<head>
    <title>AQI Prediction</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dff6ff, #c7e9ff);
        }

        .home-container {
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #555;
            margin-bottom: 40px;
        }

        /* CARDS */
        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 180px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0;
            font-size: 22px;
        }

        .card p {
            margin-top: 8px;
            color: #777;
        }

        /* BUTTONS */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-primary {
            background-color: #00b894;
            color: white;
        }

        .btn-primary:hover {
            background-color: #019875;
        }

        .btn-secondary {
            background-color: #0984e3;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #0767b3;
        }
    </style>
</head>

<body>

<div class="home-container">

    <h1>🌍 India Air Quality Prediction</h1>
    <p class="subtitle">AI-Powered AQI Forecasting for Better Health Decisions</p>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <h3>🌳 Random Forest</h3>
            <p>ML Algorithm</p>
        </div>

        <div class="card">
            <h3>📊 71.83%</h3>
            <p>Model Accuracy</p>
        </div>

        <div class="card">
            <h3>⚡ Real-time</h3>
            <p>Predictions</p>
        </div>

    </div>

    <!-- BUTTONS -->
    <div class="buttons">

        <!-- ✅ Goes to /predict -->
        <a href="/predict">
            <button class="btn-primary">Make Prediction</button>
        </a>

        <!-- ✅ FIXED (IMPORTANT) -->
        <a href="/analytics">
            <button class="btn-secondary">View Analytics</button>
        </a>

    </div>

</div>

</body>
</html>

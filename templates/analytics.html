<!DOCTYPE html>
<html>
<head>
    <title>AQI Analytics Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            background:#e6f7ff;
            font-family:Arial, sans-serif;
            margin:0;
        }

        h1{
            text-align:center;
            margin-top:20px;
            color:#2d3436;
        }

        .main-container{
            display:flex;
            justify-content:center;
            gap:40px;
            padding:20px;
            margin-top:20px;
            flex-wrap:wrap;
        }

        .container{
            width:330px;
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.15);
            height:fit-content;
        }

        h2{
            text-align:center;
        }

        label{
            display:block;
            margin-top:10px;
            font-weight:bold;
        }

        select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:15px;
        }

        button{
            width:100%;
            padding:11px;
            border:none;
            border-radius:6px;
            background:#0984e3;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#0767b3;
        }

        .result-card{
            width:650px;
        }

        .summary{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0px 4px 10px rgba(0,0,0,0.12);
        }

        .empty-box{
            background:white;
            padding:50px;
            border-radius:12px;
            text-align:center;
            box-shadow:0px 4px 10px rgba(0,0,0,0.12);
        }

        canvas{
            margin-top:20px;
        }

    </style>

</head>

<body>

<h1>📊 AQI Analytics Dashboard</h1>

<div class="main-container">

    <!-- LEFT FORM -->
    <div class="container">

        <h2>📍 Select Location</h2>

        <form method="POST">

            <!-- STATE -->
            <label>State</label>

            <select name="state" id="state" onchange="updateCities()">

                <option value="">Select State</option>

                <option>Andhra Pradesh</option>
                <option>Arunachal Pradesh</option>
                <option>Assam</option>
                <option>Bihar</option>
                <option>Chhattisgarh</option>
                <option>Goa</option>
                <option>Gujarat</option>
                <option>Haryana</option>
                <option>Himachal Pradesh</option>
                <option>Jharkhand</option>
                <option>Karnataka</option>
                <option>Kerala</option>
                <option>Madhya Pradesh</option>
                <option>Maharashtra</option>
                <option>Manipur</option>
                <option>Meghalaya</option>
                <option>Mizoram</option>
                <option>Nagaland</option>
                <option>Odisha</option>
                <option>Punjab</option>
                <option>Rajasthan</option>
                <option>Sikkim</option>
                <option>Tamil Nadu</option>
                <option>Telangana</option>
                <option>Tripura</option>
                <option>Uttar Pradesh</option>
                <option>Uttarakhand</option>
                <option>West Bengal</option>
                <option>Delhi</option>

            </select>

            <!-- CITY -->
            <label>Capital City</label>

            <select name="city" id="city">

                <option>Select State First</option>

            </select>

            <button type="submit">
                Show AQI Trend
            </button>

        </form>

    </div>

    <!-- RIGHT SIDE -->
    {% if dates and aqi_values %}

    <div class="result-card">

        <div class="summary">

            <h2>📈 7-Day AQI Trend</h2>

            <p>
                <b>{{ selected_city }}</b>, {{ selected_state }}
            </p>

            <canvas id="aqiChart"></canvas>

        </div>

    </div>

    {% else %}

    <div class="result-card">

        <div class="empty-box">

            <h3>📊 No Data Yet</h3>

            <p>
                Select location and click
                <b>Show AQI Trend</b>
            </p>

        </div>

    </div>

    {% endif %}

</div>

<!-- CHART -->
{% if dates and aqi_values %}

<script>

window.onload = function(){

    const ctx = document.getElementById('aqiChart').getContext('2d');

    new Chart(ctx, {

        type:'line',

        data:{

            labels: {{ dates | tojson }},

            datasets:[{

                label:'AQI Level',

                data: {{ aqi_values | tojson }},

                borderColor:'#0984e3',

                backgroundColor:'rgba(9,132,227,0.2)',

                fill:true,

                tension:0.4

            }]

        },

        options:{

            responsive:true,

            plugins:{
                legend:{
                    position:'bottom'
                }
            },

            scales:{
                y:{
                    beginAtZero:true
                }
            }

        }

    });

};

</script>

{% endif %}

<!-- STATE CAPITAL SCRIPT -->

<script>

const stateCityMap = {

    "Andhra Pradesh": ["Amaravati"],
    "Arunachal Pradesh": ["Itanagar"],
    "Assam": ["Dispur"],
    "Bihar": ["Patna"],
    "Chhattisgarh": ["Raipur"],
    "Goa": ["Panaji"],
    "Gujarat": ["Gandhinagar"],
    "Haryana": ["Chandigarh"],
    "Himachal Pradesh": ["Shimla"],
    "Jharkhand": ["Ranchi"],
    "Karnataka": ["Bangalore"],
    "Kerala": ["Thiruvananthapuram"],
    "Madhya Pradesh": ["Bhopal"],
    "Maharashtra": ["Mumbai"],
    "Manipur": ["Imphal"],
    "Meghalaya": ["Shillong"],
    "Mizoram": ["Aizawl"],
    "Nagaland": ["Kohima"],
    "Odisha": ["Bhubaneswar"],
    "Punjab": ["Chandigarh"],
    "Rajasthan": ["Jaipur"],
    "Sikkim": ["Gangtok"],
    "Tamil Nadu": ["Chennai"],
    "Telangana": ["Hyderabad"],
    "Tripura": ["Agartala"],
    "Uttar Pradesh": ["Lucknow"],
    "Uttarakhand": ["Dehradun"],
    "West Bengal": ["Kolkata"],
    "Delhi": ["New Delhi"]

};

function updateCities(){

    const state =
    document.getElementById("state").value;

    const cityDropdown =
    document.getElementById("city");

    cityDropdown.innerHTML = "";

    if(stateCityMap[state]){

        stateCityMap[state].forEach(city => {

            let option =
            document.createElement("option");

            option.value = city;

            option.text = city;

            cityDropdown.appendChild(option);

        });

    }

}

</script>

</body>
</html>
